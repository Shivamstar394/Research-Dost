# FILE: docker-compose.yml
# Complete Docker setup for Autonomous AI Research Agent
# Usage: docker-compose up

version: '3.8'

services:
  # Backend FastAPI service
  backend:
    container_name: research-agent-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    
    environment:
      # API Configuration
      PYTHONUNBUFFERED: "1"
      DEBUG: "False"
      LOG_LEVEL: "INFO"
      
      # LLM Configuration
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-claude-3-5-sonnet-20241022}
      
      # Service URLs
      ARXIV_BASE_URL: "http://export.arxiv.org/api/query"
      PUBMED_BASE_URL: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
      
      # Database (future enhancement)
      # DATABASE_URL: postgresql://user:password@db:5432/research_agent
    
    volumes:
      # Mount backend code for development (optional - remove for production)
      - ./backend:/app/backend
      - ./data:/app/data
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Dependencies
    depends_on:
      - redis
    
    # Network
    networks:
      - research-network
    
    # Restart policy
    restart: unless-stopped
  
  # Frontend Vite service
  frontend:
    container_name: research-agent-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    
    environment:
      # Vite environment variables
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-production}
    
    volumes:
      # Mount frontend code for development (optional)
      - ./frontend:/app
      - /app/node_modules
    
    # Dependencies
    depends_on:
      - backend
    
    # Network
    networks:
      - research-network
    
    # Restart policy
    restart: unless-stopped
  
  # Redis cache service (optional but recommended)
  redis:
    container_name: research-agent-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    
    # Data persistence
    volumes:
      - redis-data:/data
    
    # Configuration
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    # Network
    networks:
      - research-network
    
    # Restart policy
    restart: unless-stopped

  # PostgreSQL Database (optional - for future scalability)
  # Uncomment to enable
  # db:
  #   container_name: research-agent-db
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: research_agent
  #     POSTGRES_USER: ${DB_USER:-researcher}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-researcher}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - research-network
  #   restart: unless-stopped

  # Nginx reverse proxy (optional - for production)
  # Uncomment to enable
  # nginx:
  #   container_name: research-agent-nginx
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - research-network
  #   restart: unless-stopped

# Volumes for data persistence
volumes:
  redis-data:
    driver: local
  # postgres-data:
  #   driver: local

# Network definition
networks:
  research-network:
    driver: bridge


# ENVIRONMENT FILE (.env) - Copy to .env and fill in values
# ANTHROPIC_API_KEY=sk-ant-xxx
# LLM_MODEL=claude-3-5-sonnet-20241022
# VITE_API_URL=http://localhost:8000
# NODE_ENV=development
# DEBUG=True
# LOG_LEVEL=INFO


# QUICK START COMMANDS:
# 
# 1. Build images:
#    docker-compose build
#
# 2. Start all services:
#    docker-compose up
#
# 3. Start in background:
#    docker-compose up -d
#
# 4. View logs:
#    docker-compose logs -f
#
# 5. View specific service logs:
#    docker-compose logs -f backend
#    docker-compose logs -f frontend
#
# 6. Stop all services:
#    docker-compose down
#
# 7. Stop and remove volumes:
#    docker-compose down -v
#
# 8. Execute command in container:
#    docker-compose exec backend python -m pip install new_package
#
# 9. Rebuild specific service:
#    docker-compose up --build backend
#
# 10. Check status:
#     docker-compose ps
#
# PRODUCTION DEPLOYMENT:
# 1. Set DEBUG=False in .env
# 2. Uncomment nginx service and configure SSL
# 3. Use environment variables for secrets
# 4. Set up proper logging
# 5. Enable database service for persistence
# 6. Use docker-compose -f docker-compose.yml -f docker-compose.prod.yml up