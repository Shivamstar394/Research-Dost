<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/research-dost-logo.png" />
    <link rel="apple-touch-icon" href="/research-dost-logo.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta
      name="description"
      content="Research Dost — AI-powered research assistant for literature review, paper summarization, and academic drafting."
    />
    <meta name="keywords" content="research, AI, literature review, paper drafting, academic, arxiv, pubmed" />
    <meta name="author" content="Research Dost" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph -->
    <meta property="og:title" content="Research Dost — AI Research Assistant" />
    <meta property="og:description" content="Search, understand, and draft research papers in one workspace." />
    <meta property="og:type" content="website" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Research Dost — AI Research Assistant</title>

    <!-- Critical inline styles — white background, no flash -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #ffffff;
        color: #0f172a;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }

      #app-loader.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      /* ✅ Brand box now shows your logo */
      .loader-brand {
        width: 78px;
        height: 78px;
        border-radius: 20px;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
        position: relative;
        overflow: hidden;

        box-shadow:
          0 14px 44px rgba(79, 70, 229, 0.18),
          0 0 0 10px rgba(79, 70, 229, 0.06);

        animation: loaderFloat 2.5s ease-in-out infinite;
      }

      /* Gradient ring effect */
      .loader-brand::before {
        content: "";
        position: absolute;
        inset: 0;
        padding: 2px;
        border-radius: 20px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed, #a855f7);

        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        mask-composite: exclude;
        opacity: 0.9;
        pointer-events: none;
      }

      .loader-brand img {
        width: 68%;
        height: 68%;
        object-fit: contain;
        display: block;
        position: relative;
        z-index: 1;
      }

      .loader-text {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 0.4rem;
        letter-spacing: -0.01em;
      }

      .loader-subtext {
        font-family: 'Inter', sans-serif;
        font-size: 0.78rem;
        color: #94a3b8;
        margin-bottom: 2rem;
      }

      .loader-bar-track {
        width: 220px;
        height: 4px;
        background: #f1f5f9;
        border-radius: 99px;
        overflow: hidden;
      }

      .loader-bar-fill {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #4f46e5, #7c3aed, #a855f7);
        border-radius: 99px;
        animation: loaderSlide 1.4s ease-in-out infinite;
      }

      /* Subtle decorative dots */
      .loader-dot {
        position: absolute;
        border-radius: 50%;
        opacity: 0.07;
      }

      .loader-dot-1 {
        width: 300px; height: 300px;
        background: #4f46e5;
        top: -50px; right: -80px;
      }

      .loader-dot-2 {
        width: 200px; height: 200px;
        background: #7c3aed;
        bottom: -30px; left: -60px;
      }

      .loader-dot-3 {
        width: 150px; height: 150px;
        background: #a855f7;
        top: 40%; left: 60%;
      }

      @keyframes loaderFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      @keyframes loaderSlide {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(250%); }
        100% { transform: translateX(-100%); }
      }

      @media (prefers-reduced-motion: reduce) {
        .loader-brand { animation: none !important; }
        .loader-bar-fill { animation: none !important; width: 100%; }
      }
    </style>
  </head>

  <body>
    <div id="app-loader" aria-label="Loading Research Dost">
      <div class="loader-dot loader-dot-1"></div>
      <div class="loader-dot loader-dot-2"></div>
      <div class="loader-dot loader-dot-3"></div>

      <!-- ✅ LOGO HERE -->
      <div class="loader-brand">
        <img src="/research-dost-logo.png" alt="Research Dost logo" />
      </div>

      <div class="loader-text">Research Dost</div>
      <div class="loader-subtext">Preparing your research workspace…</div>

      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
